<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Perfil de Usuario</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <div class = div>
                <div class = "logo">
                    <a href="./index.html"><h1>Logo de la marca</h1></a>
                </div>
                <div class = "usuario">
                    <a href="./perfilUsuario.html"><img src="./imgs/user.png" alt=""></a>
                <h3>Cerrar sesión</h3>
                </div>

        <div class = "contenido-flex">

                            <input type="text" id="txt_nombre" class="input-stroke">

                            <input type="text" id="txt_numero" class="input-stroke">
                        </div>                  
                        <div class="input-group">
                            <label for="txt_email">Email</label>
                            <input type="email" id="txt_email" class="input-stroke">
                        </div>
                        <div class="input-group">
                            <label for="txt_direccion">Direccion</label>
                            <input type="text" id="txt_direccion" class="input-stroke">
                        </div>

                    </form>
                </div>
            </div>

        <footer>

                <img src="./imgs/svg/logoBlanco.svg" alt="">

                    <li><a href="https://mail.google.com/"><img src="./imgs/gmailLogo.svg" alt="Correo"></a></li>

                    <li><a href="">Términos y condiciones</a></li>
