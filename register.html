<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>Registro</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <div class = "login-register">
                <a href="./index.html"><h1>Logo de la marca</h1></a>
            </div>
        </header>
        <main>
           <div class = "top-contenedor">
                <a href="./index.html"><img src="./imgs/back.png" alt=""></a>
                <h1>Registrate</h1>
            </div>
            <div class="login-wrapper">
                <div class="login-box">
                    <form class="form-login">    
                        <div class = "input-group">
                            <label for="txt_nombre">Nombre</label>
                            <input type="text" id="txt_nombre" class="input-stroke">
                        </div>  
                        <div class ="input-group">
                            <label for="txt_numero">Numero</label>
                            <input type="text" id="txt_numero" class="input-stroke">
                        </div>                  
                        <div class="input-group">
                            <label for="txt_email">Email</label>
                            <input type="email" id="txt_email" class="input-stroke">
                        </div>
                        <div class = "input-group">
                            <label for="txt_direccion">Direccion</label>
                            <input type="text" id="txt_direccion" class="input-stroke">

                        </div>
                        <div class="input-group">
                            <label for="password">Contraseña</label>
                            <input type="password" id="password" class="input-stroke">
                        </div>
                        <div class = "input-group">
                            <label for="password_confirm">Confirmar contraseña</label>
                            <input type="password" id="password_confirm" class="input-stroke">
                        </div>

                        <a href="./index.html" class="btn-login">Entrar</a>
                        <h3>¿Ya tienes cuenta? <a href="./login.html">Inicia Sesión</a></h3>
                    </form>
                </div>
            </div>
        </main>
         <footer>
            <div class="logo-footer">
                <img src="./imgs/svg/logoBlanco.svg" alt="">
                <p>Aplicaciones Web - Unidad 2</p>
                <br>
            </div>

            <div class="contacto">
                <h3>Contáctanos</h3>
                <ul class="social-links">
                    <li><a href="https://www.whatsapp.com/"><img src="./imgs/whatsappLogo.svg" alt="WhatsApp"></a></li>
                    <li><a href="https://www.instagram.com/"><img src="./imgs/instaLogo.svg" alt="Instagram"></a>
                    </li>
                    <li><a href="https://www.facebook.com/"><img src="./imgs/facebookLogo.svg" alt="Facebook"></a></li>
                    <li><a href="https://mail.google.com/"><img src="./imgs/gmailLogo.svg" alt="Correo"></a></li>
                </ul>

            </div>

            <div class="avisos">
                <ul class="legal-links">
                    <li><a href="">Términos y condiciones</a></li>
                    <li><a href="">Aviso de privacidad</a></li>
                    <li><a href="">Políticas de cookies</a></li>
                </ul>
            </div>
        </footer>
    </body>
</html>
